<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div id="nav-slot"></div>
<main class="container-fluid py-4">
  <a href="/projects.html" class="btn btn-link p-0 mb-2"><i class="bi bi-arrow-left"></i> All projects</a>
  <div class="d-flex justify-content-between align-items-end mb-3 flex-wrap gap-2">
    <div><h2 id="pname" class="mb-0"></h2><p id="pdesc" class="text-muted mb-0"></p></div>
    <a id="dashLink" class="btn btn-outline-primary"><i class="bi bi-speedometer"></i> Project Dashboard</a>
  </div>
  <div class="row g-3">
    <div class="col-lg-5">
      <div class="card shadow-sm">
        <div class="card-header bg-white"><strong><i class="bi bi-calculator"></i> Weight calculator</strong></div>
        <div id="calcBody" class="card-body"></div>
      </div>
    </div>
    <div class="col-lg-7">
      <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between">
          <strong><i class="bi bi-table"></i> Calculations</strong>
          <span id="count" class="text-muted small"></span>
        </div>
        <div class="table-responsive">
          <table class="table table-sm table-hover mb-0 align-middle">
            <thead class="table-light"><tr>
              <th>When</th><th>By</th><th>Material</th><th>Dims (mm)</th>
              <th class="text-end">Qty</th><th class="text-end">kg</th><th></th>
            </tr></thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
const projectId = new URLSearchParams(location.search).get("id");
let META, ME, CAN_EDIT;

function isRound(m) { return META.roundMaterials.includes(m); }

function buildCalcForm() {
  const opts = META.materials.map(m => `<option>${escapeHtml(m)}</option>`).join("");
  el("calcBody").innerHTML = `
    <form id="calcForm">
      <div class="mb-3"><label class="form-label">Material</label>
        <select id="material" class="form-select" required>${opts}</select></div>
      <div class="row g-2">
        <div class="col-6"><label class="form-label">Length (mm)</label>
          <input id="length" type="number" step="any" min="0" class="form-control" required /></div>
        <div class="col-6"><label class="form-label">Quantity</label>
          <input id="qty" type="number" step="1" min="1" class="form-control" value="1" required /></div>
        <div class="col-6 dim-flat"><label class="form-label">Width (mm)</label>
          <input id="width" type="number" step="any" min="0" class="form-control" /></div>
        <div class="col-6 dim-flat"><label class="form-label">Thickness (mm)</label>
          <input id="thickness" type="number" step="any" min="0" class="form-control" /></div>
        <div class="col-12 dim-round hidden"><label class="form-label">Diameter (mm)</label>
          <input id="diameter" type="number" step="any" min="0" class="form-control" /></div>
      </div>
      <div class="alert alert-secondary mt-3 mb-3">
        <div class="d-flex justify-content-between"><span>Live weight</span>
          <strong><span id="liveKg">0.000</span> kg</strong></div>
        <div class="d-flex justify-content-between small text-muted"><span>Tonnes</span>
          <span><span id="liveT">0.000000</span> t</span></div>
        <div class="small text-muted mt-1">Density: ${META.density} kg/m³</div>
      </div>
      <button class="btn btn-primary w-100"><i class="bi bi-plus-circle"></i> Add to project</button>
    </form>`;

  function syncDims() {
    const r = isRound(el("material").value);
    document.querySelectorAll(".dim-flat").forEach(e => e.classList.toggle("hidden", r));
    document.querySelectorAll(".dim-round").forEach(e => e.classList.toggle("hidden", !r));
  }
  function compute() {
    const m = el("material").value;
    const L = parseFloat(el("length").value) || 0;
    const Q = parseInt(el("qty").value) || 0;
    let kg = 0;
    if (isRound(m)) {
      const D = parseFloat(el("diameter").value) || 0;
      kg = (Math.PI * D * D / 4) * L * META.density * Q / 1e9;
    } else {
      const W = parseFloat(el("width").value) || 0;
      const T = parseFloat(el("thickness").value) || 0;
      kg = (L * W * T * META.density * Q) / 1e9;
    }
    el("liveKg").textContent = kg.toFixed(3);
    el("liveT").textContent = (kg/1000).toFixed(6);
  }
  el("calcForm").addEventListener("input", compute);
  el("material").addEventListener("change", syncDims);
  syncDims();

  el("calcForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const m = el("material").value;
    const body = {
      material: m,
      length: parseFloat(el("length").value),
      qty: parseInt(el("qty").value),
    };
    if (isRound(m)) body.diameter = parseFloat(el("diameter").value) || 0;
    else { body.width = parseFloat(el("width").value) || 0;
           body.thickness = parseFloat(el("thickness").value) || 0; }
    try {
      await api(`/api/projects/${projectId}/calculations`, { method: "POST", body });
      el("length").value = ""; el("width").value = ""; el("thickness").value = ""; el("diameter").value = "";
      compute(); refresh();
    } catch (ex) { alert(ex.message); }
  });
}

async function refresh() {
  const d = await api(`/api/projects/${projectId}`);
  el("pname").textContent = d.project.name;
  el("pdesc").textContent = d.project.description || "No description";
  el("dashLink").href = `/project-dashboard.html?id=${projectId}`;
  el("count").textContent = `${d.calculations.length} entries`;
  el("rows").innerHTML = d.calculations.length ? d.calculations.map(c => {
    const dims = isRound(c.material)
      ? `Ø${c.diameter ?? 0} × L${c.length}`
      : `${c.length} × ${c.width ?? 0} × ${c.thickness ?? 0}`;
    const canDelete = ME.role === "admin" || c.userId === ME.id;
    return `<tr>
      <td class="small text-muted">${fmtDate(c.createdAt)}</td>
      <td>${escapeHtml(c.username)}</td>
      <td>${escapeHtml(c.material)}</td>
      <td class="small">${escapeHtml(dims)}</td>
      <td class="text-end">${c.qty}</td>
      <td class="text-end">${c.weightKg.toFixed(3)}</td>
      <td class="text-end">${canDelete
        ? `<button class="btn btn-sm btn-link text-danger p-0" data-del="${c.id}"><i class="bi bi-trash"></i></button>`
        : ""}</td>
    </tr>`;
  }).join("")
    : `<tr><td colspan="7" class="text-center text-muted py-4">No calculations yet</td></tr>`;
}

document.addEventListener("click", async (e) => {
  const b = e.target.closest("[data-del]"); if (!b) return;
  if (!confirm("Delete this entry?")) return;
  try { await api(`/api/projects/${projectId}/calculations/${b.dataset.del}`, { method: "DELETE" }); refresh(); }
  catch (ex) { alert(ex.message); }
});

(async () => {
  ME = await mountNav("");
  if (!ME) return;
  META = await api("/api/meta");
  const d = await api(`/api/projects/${projectId}`);
  CAN_EDIT = d.canEdit;
  if (CAN_EDIT) buildCalcForm();
  else el("calcBody").innerHTML = `<div class="alert alert-warning small mb-0">Viewers cannot submit calculations.</div>`;
  refresh();
})();
</script>
</body>
</html>
