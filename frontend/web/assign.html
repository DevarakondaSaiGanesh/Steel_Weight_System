<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Assign Users</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div id="nav-slot"></div>
<main class="container-fluid py-4">
  <a href="/admin-projects.html" class="btn btn-link p-0 mb-2"><i class="bi bi-arrow-left"></i> Back to projects</a>
  <h2 id="pname" class="mb-1"></h2>
  <p id="pdesc" class="text-muted"></p>
  <div class="row g-3">
    <div class="col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-header bg-white"><strong>Assigned users</strong></div>
        <ul id="assigned" class="list-group list-group-flush"></ul>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-header bg-white"><strong>Available users</strong></div>
        <ul id="available" class="list-group list-group-flush"></ul>
      </div>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
const projectId = new URLSearchParams(location.search).get("id");
function userRow(u, btn) {
  return `<li class="list-group-item d-flex justify-content-between align-items-center">
    <div>${escapeHtml(u.username)} <span class="badge bg-secondary text-uppercase">${escapeHtml(u.role)}</span></div>
    ${btn}
  </li>`;
}
async function refresh() {
  const d = await api(`/api/admin/projects/${projectId}/assignments`);
  el("pname").textContent = d.project.name;
  el("pdesc").textContent = d.project.description || "No description";
  el("assigned").innerHTML = d.assigned.length
    ? d.assigned.map(u => userRow(u,
        `<button class="btn btn-sm btn-outline-danger" data-action="remove" data-id="${u.id}">
           <i class="bi bi-x-lg"></i> Remove</button>`)).join("")
    : `<li class="list-group-item text-muted">No users assigned yet</li>`;
  el("available").innerHTML = d.available.length
    ? d.available.map(u => userRow(u,
        `<button class="btn btn-sm btn-outline-primary" data-action="add" data-id="${u.id}">
           <i class="bi bi-plus-lg"></i> Assign</button>`)).join("")
    : `<li class="list-group-item text-muted">No more users to assign</li>`;
}
document.addEventListener("click", async (e) => {
  const t = e.target.closest("[data-action]"); if (!t) return;
  try {
    if (t.dataset.action === "add") {
      await api(`/api/admin/projects/${projectId}/assignments`, { method: "POST", body: { user_id: +t.dataset.id } });
    } else {
      await api(`/api/admin/projects/${projectId}/assignments/${t.dataset.id}`, { method: "DELETE" });
    }
    refresh();
  } catch (ex) { alert(ex.message); }
});
(async () => {
  const me = await mountNav("");
  if (!me) return;
  if (me.role !== "admin") { location.href = "/projects.html"; return; }
  refresh();
})();
</script>
</body>
</html>
