<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Projects</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
<div id="nav-slot"></div>
<main class="container-fluid py-4">
  <h2 class="mb-3">My Projects</h2>
  <div id="grid" class="row g-3"></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
(async () => {
  const me = await mountNav("/projects.html");
  if (!me) return;
  const ps = await api("/api/projects");
  el("grid").innerHTML = ps.length ? ps.map(p => `
    <div class="col-md-6 col-lg-4">
      <div class="card shadow-sm h-100"><div class="card-body">
        <h5 class="card-title">${escapeHtml(p.name)}</h5>
        <p class="card-text text-muted small">${escapeHtml(p.description) || "No description"}</p>
        <div class="d-flex justify-content-between text-muted small mb-3">
          <span><i class="bi bi-list-ol"></i> ${p.entries} entries</span>
          <span><i class="bi bi-bar-chart"></i> ${(p.weightKg/1000).toFixed(2)} t</span>
        </div>
        <a href="/workspace.html?id=${p.id}" class="btn btn-primary btn-sm">
          <i class="bi bi-box-arrow-in-right"></i> Open</a>
        <a href="/project-dashboard.html?id=${p.id}" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-speedometer"></i> Dashboard</a>
      </div></div>
    </div>`).join("")
    : `<div class="col-12"><div class="alert alert-info">No projects assigned to you yet. Please contact your administrator.</div></div>`;
})();
</script>
</body>
</html>
