<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Change Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="bg-body-tertiary">
<main class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow-sm mt-5">
        <div class="card-body p-4">
          <h4 class="mb-3"><i class="bi bi-shield-lock"></i> Set a new password</h4>
          <p class="text-muted small">For security, please change your password before continuing.</p>
          <div id="error" class="alert alert-danger hidden"></div>
          <form id="form">
            <div class="mb-3"><label class="form-label">New password</label>
              <input id="pw1" type="password" class="form-control" minlength="6" required /></div>
            <div class="mb-3"><label class="form-label">Confirm password</label>
              <input id="pw2" type="password" class="form-control" minlength="6" required /></div>
            <button class="btn btn-primary w-100">Update password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>
<script src="/js/api.js"></script>
<script>
(async () => { try { await api("/api/me"); } catch (_) {} })();
el("form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const err = el("error"); err.classList.add("hidden");
  if (el("pw1").value !== el("pw2").value) {
    err.textContent = "Passwords do not match"; err.classList.remove("hidden"); return;
  }
  try {
    const u = await api("/api/change-password", {
      method: "POST", body: { new_password: el("pw1").value },
    });
    location.href = u.role === "admin" ? "/admin.html" : "/projects.html";
  } catch (ex) {
    err.textContent = ex.message; err.classList.remove("hidden");
  }
});
</script>
</body>
</html>
