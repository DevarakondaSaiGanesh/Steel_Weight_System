<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manage Projects</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div id="nav-slot"></div>
<main class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Projects</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newProjectModal">
      <i class="bi bi-plus-lg"></i> New project
    </button>
  </div>
  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light"><tr>
          <th>Name</th><th>Description</th><th>Users</th><th>Entries</th><th>Weight (t)</th><th>Created</th><th></th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal fade" id="newProjectModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="createForm" class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Create project</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="mb-3"><label class="form-label">Name</label>
          <input id="newName" class="form-control" required /></div>
        <div class="mb-3"><label class="form-label">Description</label>
          <textarea id="newDesc" class="form-control" rows="3"></textarea></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary">Create</button>
      </div>
    </form>
  </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="editForm" class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Edit project</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="editId" />
        <div class="mb-3"><label class="form-label">Name</label>
          <input id="editName" class="form-control" required /></div>
        <div class="mb-3"><label class="form-label">Description</label>
          <textarea id="editDesc" class="form-control" rows="3"></textarea></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
async function refresh() {
  const ps = await api("/api/admin/projects");
  el("rows").innerHTML = ps.length ? ps.map(p => `
    <tr>
      <td><strong>${escapeHtml(p.name)}</strong></td>
      <td class="text-muted small">${escapeHtml(p.description)}</td>
      <td>${p.assignedUsers}</td>
      <td>${p.entries}</td>
      <td>${(p.weightKg/1000).toFixed(2)}</td>
      <td class="small text-muted">${p.createdAt.slice(0,10)}</td>
      <td class="text-end">
        <a href="/assign.html?id=${p.id}" class="btn btn-sm btn-outline-primary"><i class="bi bi-people"></i> Assign</a>
        <button class="btn btn-sm btn-outline-secondary" data-action="edit"
          data-id="${p.id}" data-name="${escapeHtml(p.name)}" data-desc="${escapeHtml(p.description)}">
          <i class="bi bi-pencil"></i>
        </button>
        <button class="btn btn-sm btn-outline-danger" data-action="delete"
          data-id="${p.id}" data-name="${escapeHtml(p.name)}">
          <i class="bi bi-trash"></i>
        </button>
      </td>
    </tr>`).join("")
    : `<tr><td colspan="7" class="text-center text-muted py-4">No projects yet</td></tr>`;
}

document.addEventListener("click", async (e) => {
  const t = e.target.closest("[data-action]"); if (!t) return;
  if (t.dataset.action === "edit") {
    el("editId").value = t.dataset.id;
    el("editName").value = t.dataset.name;
    el("editDesc").value = t.dataset.desc;
    new bootstrap.Modal(el("editModal")).show();
  } else if (t.dataset.action === "delete") {
    if (!confirm(`Delete ${t.dataset.name}? All calculations will be removed.`)) return;
    try { await api(`/api/admin/projects/${t.dataset.id}`, { method: "DELETE" }); refresh(); }
    catch (ex) { alert(ex.message); }
  }
});

el("createForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  try {
    await api("/api/admin/projects", { method: "POST",
      body: { name: el("newName").value, description: el("newDesc").value } });
    el("newName").value = ""; el("newDesc").value = "";
    bootstrap.Modal.getInstance(el("newProjectModal")).hide();
    refresh();
  } catch (ex) { alert(ex.message); }
});

el("editForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  try {
    await api(`/api/admin/projects/${el("editId").value}`, { method: "PATCH",
      body: { name: el("editName").value, description: el("editDesc").value } });
    bootstrap.Modal.getInstance(el("editModal")).hide();
    refresh();
  } catch (ex) { alert(ex.message); }
});

(async () => {
  const me = await mountNav("/admin-projects.html");
  if (!me) return;
  if (me.role !== "admin") { location.href = "/projects.html"; return; }
  refresh();
})();
</script>
</body>
</html>
