<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Steel Weight System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="bg-body-tertiary">
<main class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow-sm mt-5">
        <div class="card-body p-4">
          <h3 class="text-center mb-1"><i class="bi bi-bricks"></i> Steel Weight</h3>
          <p class="text-center text-muted mb-4">Sign in to continue</p>
          <div id="error" class="alert alert-danger hidden"></div>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input id="username" type="text" class="form-control" required autofocus />
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input id="password" type="password" class="form-control" required />
            </div>
            <button class="btn btn-primary w-100">Sign in</button>
          </form>
          <p class="text-center text-muted small mt-3 mb-0">
            Default admin: <code>admin</code> / <code>admin123</code>
          </p>
        </div>
      </div>
    </div>
  </div>
</main>
<script src="js/api.js"></script>
<script>
(async () => {
  try {
    const me = await fetch("/api/me", { credentials: "same-origin" });
    if (me.ok) {
      const u = await me.json();
      location.href = u.firstLogin ? "/change-password.html"
        : u.role === "admin" ? "/admin.html" : "/projects.html";
    }
  } catch (_) {}
})();

el("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const err = el("error"); err.classList.add("hidden");
  try {
    const u = await api("/api/login", {
      method: "POST",
      body: { username: el("username").value, password: el("password").value },
    });
    location.href = u.firstLogin ? "/change-password.html"
      : u.role === "admin" ? "/admin.html" : "/projects.html";
  } catch (ex) {
    err.textContent = ex.message;
    err.classList.remove("hidden");
  }
});
</script>
</body>
</html>
