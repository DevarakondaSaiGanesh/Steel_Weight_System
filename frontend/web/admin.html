<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
<div id="nav-slot"></div>
<main class="container-fluid py-4">
  <h2 class="mb-4">Admin Dashboard</h2>
  <div id="cards" class="row g-3 mb-4"></div>
  <div class="row g-3">
    <div class="col-lg-6"><div class="card shadow-sm h-100">
      <div class="card-header bg-white"><strong>Top projects by weight</strong></div>
      <div class="card-body"><canvas id="topChart" height="180"></canvas></div></div></div>
    <div class="col-lg-6"><div class="card shadow-sm h-100">
      <div class="card-header bg-white"><strong>Users by role</strong></div>
      <div class="card-body"><canvas id="rolesChart" height="180"></canvas></div></div></div>
  </div>
  <div class="card shadow-sm mt-4">
    <div class="card-header bg-white"><strong>Recent calculations</strong></div>
    <div class="table-responsive">
      <table class="table table-hover mb-0 align-middle">
        <thead class="table-light"><tr>
          <th>When</th><th>By</th><th>Material</th><th>Qty</th><th class="text-end">Weight (kg)</th>
        </tr></thead>
        <tbody id="recent"></tbody>
      </table>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
(async () => {
  const me = await mountNav("/admin.html");
  if (!me) return;
  if (me.role !== "admin") { location.href = "/projects.html"; return; }
  const d = await api("/api/admin/dashboard");
  const t = d.totals, byRole = d.byRole;
  el("cards").innerHTML = `
    <div class="col-sm-6 col-lg-3"><div class="card shadow-sm h-100"><div class="card-body">
      <div class="text-muted small">Total Users</div><div class="display-6">${t.users}</div>
      <div class="small text-muted">Admin ${byRole.admin} · User ${byRole.user} · Viewer ${byRole.viewer}</div>
    </div></div></div>
    <div class="col-sm-6 col-lg-3"><div class="card shadow-sm h-100"><div class="card-body">
      <div class="text-muted small">Total Projects</div><div class="display-6">${t.projects}</div>
    </div></div></div>
    <div class="col-sm-6 col-lg-3"><div class="card shadow-sm h-100"><div class="card-body">
      <div class="text-muted small">Total Calculations</div><div class="display-6">${t.calculations}</div>
    </div></div></div>
    <div class="col-sm-6 col-lg-3"><div class="card shadow-sm h-100"><div class="card-body">
      <div class="text-muted small">Total Weight</div>
      <div class="display-6">${(t.weightKg/1000).toFixed(2)} <small class="text-muted fs-6">t</small></div>
      <div class="small text-muted">${t.weightKg.toLocaleString(undefined,{maximumFractionDigits:0})} kg</div>
    </div></div></div>`;
  el("recent").innerHTML = d.recent.length
    ? d.recent.map(c => `<tr><td class="small text-muted">${fmtDate(c.createdAt)}</td>
        <td>${escapeHtml(c.username)}</td><td>${escapeHtml(c.material)}</td>
        <td>${c.qty}</td><td class="text-end">${c.weightKg.toFixed(2)}</td></tr>`).join("")
    : `<tr><td colspan="5" class="text-center text-muted py-4">No calculations yet</td></tr>`;
  new Chart(el("topChart"), {
    type: "bar",
    data: { labels: d.topProjects.map(p => p.name),
      datasets: [{ label: "Tonnes", data: d.topProjects.map(p => p.weightKg/1000), backgroundColor: "#0d6efd" }] },
    options: { plugins: { legend: { display: false } } }
  });
  new Chart(el("rolesChart"), {
    type: "doughnut",
    data: { labels: ["Admin", "User", "Viewer"],
      datasets: [{ data: [byRole.admin, byRole.user, byRole.viewer],
        backgroundColor: ["#dc3545", "#0d6efd", "#6c757d"] }] }
  });
})();
</script>
</body>
</html>
