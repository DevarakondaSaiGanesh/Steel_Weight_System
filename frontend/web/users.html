<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Users</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div id="nav-slot"></div>
<main class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Users</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newUserModal">
      <i class="bi bi-person-plus"></i> New user
    </button>
  </div>
  <div id="alert" class="alert alert-success hidden"></div>
  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light"><tr>
          <th>Username</th><th>Role</th><th>Status</th><th>Projects</th><th>Created</th><th></th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal fade" id="newUserModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="createForm" class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Create user</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3"><label class="form-label">Username</label>
          <input id="newUsername" class="form-control" required /></div>
        <div class="mb-3"><label class="form-label">Role</label>
          <select id="newRole" class="form-select" required>
            <option value="user">User</option>
            <option value="viewer">Viewer</option>
            <option value="admin">Admin</option>
          </select></div>
        <p class="small text-muted mb-0">A random password will be generated and shown once.</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary">Create</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
let currentMe;
async function refresh() {
  const users = await api("/api/admin/users");
  el("rows").innerHTML = users.map(u => `
    <tr>
      <td><strong>${escapeHtml(u.username)}</strong></td>
      <td>
        <select class="form-select form-select-sm" data-action="role" data-id="${u.id}" style="width:auto;display:inline-block">
          <option value="admin"${u.role==="admin"?" selected":""}>admin</option>
          <option value="user"${u.role==="user"?" selected":""}>user</option>
          <option value="viewer"${u.role==="viewer"?" selected":""}>viewer</option>
        </select>
      </td>
      <td>${u.firstLogin
        ? '<span class="badge bg-warning text-dark">Awaiting first login</span>'
        : '<span class="badge bg-success">Active</span>'}</td>
      <td>${u.assignedProjects}</td>
      <td class="small text-muted">${u.createdAt.slice(0,10)}</td>
      <td class="text-end">
        <button class="btn btn-sm btn-outline-warning" data-action="reset" data-id="${u.id}">
          <i class="bi bi-arrow-clockwise"></i> Reset
        </button>
        ${u.id === currentMe.id ? "" : `
        <button class="btn btn-sm btn-outline-danger" data-action="delete" data-id="${u.id}" data-name="${escapeHtml(u.username)}">
          <i class="bi bi-trash"></i>
        </button>`}
      </td>
    </tr>`).join("");
}

function showAlert(html) {
  const a = el("alert"); a.innerHTML = html; a.classList.remove("hidden");
}

document.addEventListener("change", async (e) => {
  const t = e.target;
  if (t.dataset.action === "role") {
    try { await api(`/api/admin/users/${t.dataset.id}/role`, { method: "PATCH", body: { role: t.value } }); }
    catch (ex) { alert(ex.message); refresh(); }
  }
});

document.addEventListener("click", async (e) => {
  const t = e.target.closest("[data-action]"); if (!t) return;
  const id = t.dataset.id;
  if (t.dataset.action === "reset") {
    if (!confirm("Reset this user's password?")) return;
    try {
      const r = await api(`/api/admin/users/${id}/reset-password`, { method: "POST" });
      showAlert(`<h5 class="mb-2"><i class="bi bi-key"></i> Password reset</h5>
        Username: <strong>${escapeHtml(r.user.username)}</strong><br/>
        New password: <code class="fs-5">${escapeHtml(r.generatedPassword)}</code>
        <div class="small text-muted mt-1">Copy this now — it won't be shown again.</div>`);
      refresh();
    } catch (ex) { alert(ex.message); }
  } else if (t.dataset.action === "delete") {
    if (!confirm(`Delete user ${t.dataset.name}?`)) return;
    try { await api(`/api/admin/users/${id}`, { method: "DELETE" }); refresh(); }
    catch (ex) { alert(ex.message); }
  }
});

el("createForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  try {
    const r = await api("/api/admin/users", {
      method: "POST",
      body: { username: el("newUsername").value, role: el("newRole").value },
    });
    showAlert(`<h5 class="mb-2"><i class="bi bi-key"></i> User created</h5>
      Username: <strong>${escapeHtml(r.user.username)}</strong> (${escapeHtml(r.user.role)})<br/>
      Password: <code class="fs-5">${escapeHtml(r.generatedPassword)}</code>
      <div class="small text-muted mt-1">Copy this now — it won't be shown again.</div>`);
    el("newUsername").value = "";
    bootstrap.Modal.getInstance(el("newUserModal")).hide();
    refresh();
  } catch (ex) { alert(ex.message); }
});

(async () => {
  currentMe = await mountNav("/users.html");
  if (!currentMe) return;
  if (currentMe.role !== "admin") { location.href = "/projects.html"; return; }
  refresh();
})();
</script>
</body>
</html>
